services:
  postgres:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_USER: aegisure
      POSTGRES_PASSWORD: aegisure
      POSTGRES_DB: aegisure
    ports:
      - "5432:5432"
    volumes:
      - aegisure_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U aegisure -d aegisure"]
      interval: 5s
      timeout: 3s
      retries: 20

volumes:
  aegisure_postgres_data:
